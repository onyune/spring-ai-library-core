<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">
<head>
    <meta charset="UTF-8">
    <title>Ai-Library-team4 — AI 도서 검색</title>
</head>
<body>

<div layout:fragment="content">

    <!-- ══ 검색 폼 ══════════════════════════════════════════ -->
    <div class="search-form-container"
         th:classappend="${books == null} ? 'hero-search-container' : 'compact-search-container'">

        <!-- Hero 웰컴 영역 -->
        <div th:if="${books == null}" class="hero-welcome">
            <h1 class="hero-title">스마트 AI 도서 검색</h1>
            <p class="hero-subtitle">원하는 키워드나 질문을 입력하세요. AI가 가장 적합한 책을 찾아드립니다.</p>
        </div>

        <!-- Compact 헤더 -->
        <div th:unless="${books == null}" class="compact-header">
            <h2 class="compact-title m-0">AI 도서 검색</h2>
        </div>

        <form id="searchForm" th:action="@{/search}" method="post" class="search-form">
            <input type="hidden" name="page" id="pageNumber" th:value="${page != null ? page.number : 0}">

            <div class="search-row">
                <!-- 검색 방식 -->
                <div class="search-col-type">
                    <label class="form-label">검색 방식</label>
                    <select name="searchType" class="form-select">
                        <option value="KEYWORD" th:selected="${request != null && request.searchType == T(com.nhnacademy.springailibrarycore.book.domain.SearchType).KEYWORD}">키워드</option>
                        <option value="VECTOR"  th:selected="${request != null && request.searchType == T(com.nhnacademy.springailibrarycore.book.domain.SearchType).VECTOR}">벡터 유사도</option>
                        <option value="HYBRID"  th:selected="${request != null && request.searchType == T(com.nhnacademy.springailibrarycore.book.domain.SearchType).HYBRID}">하이브리드</option>
                        <option value="RAG"     th:selected="${request != null && request.searchType == T(com.nhnacademy.springailibrarycore.book.domain.SearchType).RAG}">AI (RAG)</option>
                        <option value="AUTO"    th:selected="${request != null && request.searchType == T(com.nhnacademy.springailibrarycore.book.domain.SearchType).AUTO}">자동</option>
                    </select>
                </div>

                <!-- 키워드 -->
                <div class="search-col-keyword">
                    <label class="form-label">검색 키워드</label>
                    <input type="text" name="keyword" class="form-control"
                           placeholder="제목, 저자, 내용 키워드 또는 질문..."
                           th:value="${request != null ? request.keyword : ''}" required>
                </div>

                <!-- ISBN -->
                <div class="search-col-isbn">
                    <label class="form-label">ISBN (선택)</label>
                    <input type="text" name="isbn" class="form-control"
                           placeholder="ISBN"
                           th:value="${request != null ? request.isbn : ''}">
                </div>

                <!-- 검색 버튼 -->
                <div class="search-col-btn">
                    <button type="submit" class="btn btn-primary fw-bold w-100">검색</button>
                </div>
            </div>
        </form>
    </div>

    <!-- ══ 로딩 오버레이 ════════════════════════════════════ -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner-card">
            <div class="spinner-glow mb-3">
                <div class="spinner-border" role="status" style="width:3rem;height:3rem;border-width:.22em;">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
            <h4 class="fw-bold mb-1">도서 분석 중</h4>
            <p class="mb-0">AI가 가장 적합한 도서를 탐색하고 있습니다.</p>
        </div>
    </div>

    <!-- ══ 검색 결과 ════════════════════════════════════════ -->
    <div th:if="${books != null}">

        <!-- 결과 메타 -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center gap-2">
                <h3 class="fw-bold m-0" style="font-size:17px;letter-spacing:-.02em;">검색 결과</h3>
                <span class="badge bg-blue-lt" th:text="${page.totalElements + '권'}">0권</span>
            </div>
            <div th:if="${searchTime != null}" class="text-muted" style="font-size:12px;">
                검색 속도 <span class="badge bg-secondary-lt ms-1" th:text="${searchTime + '초'}">0.000초</span>
            </div>
        </div>

        <!-- 결과 없음 -->
        <div th:if="${books.isEmpty()}" class="no-results-banner text-center">
            <div class="banner-icon mb-3">🔍</div>
            <h4 class="fw-bold" style="font-size:16px;">검색된 도서가 없습니다</h4>
            <p class="text-muted small mb-0">키워드를 바꾸거나 검색 방식을 변경해 보세요.</p>
        </div>

        <!-- 도서 그리드 -->
        <div th:unless="${books.isEmpty()}" class="row row-cards">
            <div th:each="book : ${books}" class="col-md-6 col-lg-4 col-xl-3">
                <div class="card h-100 book-card border-0">

                    <!-- 점수 뱃지 -->
                    <div class="card-badges">
                        <span th:if="${book.relevance != null}" class="badge bg-green"
                              th:text="${'AI ' + book.relevance + '점'}"></span>
                        <span th:if="${book.similarity != null}" class="badge bg-blue"
                              th:text="${'유사도 ' + #numbers.formatPercent(book.similarity, 1, 0)}"></span>
                        <span th:if="${book.rrfScore != null}" class="badge bg-purple"
                              th:text="${'RRF ' + #numbers.formatDecimal(book.rrfScore, 1, 3)}"></span>
                    </div>

                    <!-- 커버 이미지 -->
                    <div class="book-image-container">
                        <a th:href="@{/books/{id}(id=${book.id})}" class="d-block text-center w-100 h-100 d-flex align-items-center justify-content-center">
                            <img th:src="${book.imageUrl != null && !book.imageUrl.isEmpty() ? book.imageUrl : 'https://placehold.co/150x210?text=No+Cover'}"
                                 class="book-img" th:alt="${book.title}"
                                 onerror="this.onerror=null;this.src='https://placehold.co/150x210?text=No+Cover'">
                        </a>
                    </div>

                    <!-- 카드 본문 -->
                    <div class="card-body d-flex flex-column">
                        <h4 class="card-title text-truncate mb-1">
                            <a th:href="@{/books/{id}(id=${book.id})}" class="text-dark text-decoration-none"
                               th:text="${book.title}" th:title="${book.title}">도서 제목</a>
                        </h4>
                        <div class="book-author-info text-truncate"
                             th:text="${book.authorName + ' · ' + book.publisherName}"
                             th:title="${book.authorName + ' · ' + book.publisherName}">저자 · 출판사</div>
                        <p class="card-text book-summary flex-grow-1" th:text="${book.bookContent}">내용 요약</p>
                        <div class="book-card-footer">
                            <span class="price-text"
                                  th:text="${#numbers.formatInteger(book.price, 0, 'COMMA') + '원'}">0원</span>
                            <span class="isbn-badge" th:text="${book.isbn}">ISBN</span>
                        </div>
                    </div>

                    <!-- AI 추천 코멘트 -->
                    <div th:if="${book.aiComment != null && !book.aiComment.isEmpty()}" class="ai-comment-container">
                        <span class="ai-badge">
                            <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24"
                                 stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round"
                                 stroke-linejoin="round" style="vertical-align:middle;margin-right:3px">
                                <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                                <path d="M7 7h10a2 2 0 0 1 2 2v1l1 1v3l-1 1v3a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2v-3l-1 -1v-3l1 -1v-1a2 2 0 0 1 2 -2z"/>
                                <path d="M10 16h4"/>
                                <circle cx="8.5" cy="11.5" r=".5" fill="currentColor"/>
                                <circle cx="15.5" cy="11.5" r=".5" fill="currentColor"/>
                                <path d="M9 7l-1 -4"/><path d="M15 7l1 -4"/>
                            </svg>AI 추천
                        </span>
                        <p class="ai-comment-text mb-0" th:text="${book.aiComment}" th:title="${book.aiComment}"></p>
                    </div>

                </div>
            </div>
        </div>

        <!-- 페이지네이션 -->
        <div th:if="${page != null && page.totalPages > 1}" class="d-flex justify-content-center mt-5">
            <ul class="pagination">
                <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                    <a class="page-link" href="#"
                       th:onclick="'changePage(' + ${page.number - 1} + '); return false;'">&laquo;</a>
                </li>
                <li class="page-item" th:each="pageNum : ${pageNumbers}"
                    th:classappend="${pageNum == page.number} ? 'active'">
                    <a class="page-link" href="#"
                       th:onclick="'changePage(' + ${pageNum} + '); return false;'"
                       th:text="${pageNum + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                    <a class="page-link" href="#"
                       th:onclick="'changePage(' + ${page.number + 1} + '); return false;'">&raquo;</a>
                </li>
            </ul>
        </div>

    </div>

    <!-- ══ 페이지 스크립트 ═══════════════════════════════════ -->
    <script th:inline="javascript">
        function changePage(pageNum) {
            document.getElementById('pageNumber').value = pageNum;
            document.getElementById('loadingOverlay').classList.add('active');
            document.getElementById('searchForm').submit();
        }

        document.getElementById('searchForm').addEventListener('submit', function (e) {
            if (this.checkValidity()) {
                document.getElementById('pageNumber').value = 0;
                document.getElementById('loadingOverlay').classList.add('active');
            }
        });
    </script>

</div>

</body>
</html>

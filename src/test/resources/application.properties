spring.application.name=spring-ai-library-core-test

# Redis Dummy
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=dummy
spring.data.redis.cache.database=35
spring.data.redis.database=39

# Datasource Dummy
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/dummy
spring.datasource.username=dummy
spring.datasource.password=dummy

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# API Dummy
data4-library.api.url=http://data4library.kr/api/
data4-library.api.service-key=${DATA_LIBRARY_SERVICE_KEY:dummy}
library.api.timeout=5000
library.api.cache-enabled=true

# Spring AI Dummy
spring.ai.openai.base-url=https://emb.java21.net
spring.ai.openai.api-key=dummy
spring.ai.openai.embedding.options.model=bge-m3
spring.ai.vectorstore.pgvector.embedding-model-bean-name=openAiEmbeddingModel
spring.ai.openai.chat.enabled=false

# Google genai Dummy
spring.ai.google.genai.api-key=dummy
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.temperature=0.7
spring.ai.google.genai.project-id=unused

# Ollama Dummy
spring.ai.ollama.base-url=http://ollama.java21.net
spring.ai.ollama.chat.options.model=qwen2.5:latest
spring.ai.ollama.chat.options.temperature=0.3
spring.ai.ollama.embedding.enabled=false
spring.ai.ollama.chat.options.duration=300
spring.ai.ollama.init.timeout=300

spring.ai.selected-model=ollama

# Auto-configuration Exclusions
spring.autoconfigure.exclude=org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

semantic.cache.similarity.threshold=0.87
semantic.cache.similarity.ttl=1800
